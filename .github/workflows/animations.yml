name: Generate Profile Animations

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Create the output directory manually first
      - name: setup dist
        run: mkdir -p dist

      # 2. Generate Snake Animation (configured to output into dist)
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # 3. Generate Pacman Animation
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
      
      # 4. Move Pacman SVG with a "Find and Move" logic
      # This fixes the 'No such file' error by locating the file anywhere in the workspace
      - name: organize files
        run: |
          find . -name "pacman-contribution-graph.svg" -exec mv {} dist/ \;
          ls -R dist/ # This logs the contents so you can see if it worked in the Action logs

      # 5. Push to the output branch
      - name: push animations to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
